{% if site.post_search %}

<div id="beautifuljekyll-search-overlay">

  <button id="nav-search-exit" type="button" title="关闭搜索" aria-label="关闭搜索">✕</button>
  <input type="text" id="nav-search-input" placeholder="搜索">
  <ul id="search-results-container"></ul>
  
  <script src="https://unpkg.com/simple-jekyll-search@1.10.0/dest/simple-jekyll-search.min.js" integrity="sha256-ieUctArvXa2Jaww7u+OyjqzBpOW04E9K17BzP8qrxVM=" crossorigin="anonymous"></script>
  <script>
    SimpleJekyllSearch({
      searchInput: document.getElementById('nav-search-input'),
      resultsContainer: document.getElementById('search-results-container'),
      json: '{{ site.baseurl }}/assets/data/searchcorpus.json' 
    });
  </script>
</div>

{% endif %}
