# Cloudflare Pages 配置文件
# 专为静态站点部署优化
# 文档：https://developers.cloudflare.com/pages/

name = "beautifuljekyll"
compatibility_date = "2024-01-01"

# Pages 构建配置（在 Cloudflare Pages Dashboard 中设置）：
# - 构建命令：bundle exec jekyll build
# - 构建输出目录：_site
# - 根目录：/
# - 环境变量：JEKYLL_ENV=production

# 环境变量
[vars]
JEKYLL_ENV = "production"

# 部署预览配置
[env.preview]
name = "beautifuljekyll-preview"
vars = { JEKYLL_ENV = "development" }

[env.production]
name = "beautifuljekyll"
vars = { JEKYLL_ENV = "production" }

# 说明：
# 1. _headers 文件配置 HTTP 安全头和缓存策略
# 2. _redirects 文件配置 URL 重定向
# 3. 这两个文件会被 Cloudflare Pages 自动识别
